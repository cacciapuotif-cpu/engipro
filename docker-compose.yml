version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: engipro-postgres
    environment:
      POSTGRES_DB: engipro
      POSTGRES_USER: engipro
      POSTGRES_PASSWORD: engipro123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engipro -d engipro"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - engipro-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: engipro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - engipro-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: engipro-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_root
    command: server /minio_root --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - engipro-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: engipro-backend
    environment:
      DATABASE_URL: postgresql://engipro:engipro123@postgres:5432/engipro
      REDIS_URL: redis://redis:6379/0
      MINIO_URL: minio:9000
      ENV: development
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - engipro-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  engipro-network:
    driver: bridge
